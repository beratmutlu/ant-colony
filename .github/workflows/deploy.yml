name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pygbag
        run: pip install pygbag

      - name: Copy shared modules into web/
        run: |
          cp -r colony web/colony
          cp -r rendering web/rendering

      - name: Verify web/ structure
        run: |
          echo "=== web/ contents ==="
          find web/ -type f -name "*.py" | sort
          echo "=== end ==="

      - name: Build with pygbag
        run: python -m pygbag --build web

      - name: Verify build output
        run: |
          echo "=== build output ==="
          ls -la web/build/web/
          echo "=== archive contents ==="
          tar -tzf web/build/web/web.tar.gz || python3 -c "
          import zipfile, sys
          with zipfile.ZipFile('web/build/web/web.apk') as z:
              z.printdir()
          "

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/build/web

      - uses: actions/deploy-pages@v4
        id: deployment